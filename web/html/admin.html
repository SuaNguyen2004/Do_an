<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
        <link

        <title>ADMIN</title>
    </head>
    <body>
        <!-- header -->
        <header class="mb-4">
            <div class="bg-secondary-subtle p-5">

                    <button class="btn btn-info me-2 mb-2 mb-sm-0">

                    </button>
                    <button class="btn btn-warning me-2 mb-2 mb-sm-0">
                        <a href="#" class="text-decoration-none text-dark fw-bold">Danh mục</a>

                    <button class="btn btn-success me-2 mb-2 mb-sm-0">
                        <a href="#" class="text-decoration-none text-light fw-bold">Sản phẩm</a>
                    </button>
                    <button class="btn btn-primary me-2">
                        <a href="#" class="text-decoration-none text-light fw-bold">Tài khoản</a>
                    </button>
                    <button class="btn btn-danger me-2">
                        <a href="#" class="text-decoration-none text-light fw-bold text-center"

                        >

            </div>

        <!-- main -->
        <main class="mb-4">
            <div class="bg-secondary-subtle p-5">
                <h2>THỐNG KÊ</h2>
            </div>
        </main>

        <!-- footer -->
        <footer class="mb-4">
            <div class="bg-secondary-subtle p-2">
                <p class="fw-bold text-center">CHÚC BẠN CÓ MỘT NGÀY LÀM VIỆC HIỆU QUẢ</p>
            </div>
        </footer>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
