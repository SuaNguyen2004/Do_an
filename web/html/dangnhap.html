<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Đăng Nhập - MiniMart</title>

        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet" />
        <link rel="stylesheet" href="../css/auth.css" />
    </head>

    <body>
        <div class="auth-body d-flex align-items-center justify-content-center p-3">
            <div class="auth-container w-100 p-3 border border-1">
                <h3 class="auth-title text-uppercase fw-bold text-center fs-3 mb-3">Đăng Nhập</h3>

                <form action="#" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Tên đăng nhập: </label>
                        <div class="position-relative d-flex align-items-center">
                            <input
                                type="text"
                                class="form-control auth-input"
                                placeholder="Nhập tên đăng nhập"
                                required />
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Mật khẩu: </label>
                        <div class="position-relative d-flex align-items-center">
                            <input
                                type="password"
                                class="form-control auth-input"
                                placeholder="Nhập mật khẩu"
                                required />
                        </div>
                    </div>

                    <button type="submit" class="btn btn-success w-100 fw-bold mb-3">
                        ĐĂNG NHẬP
                    </button>

                    <div class="text-center">
                        Bạn chưa có tài khoản?
                        <a href="dangky.html" class="auth-link">Đăng ký ngay</a>
                    </div>
                    <div class="text-center mt-3">
                        <a href="home.html" class="auth-link">Quay lại trang chủ</a>
                    </div>
                </form>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
